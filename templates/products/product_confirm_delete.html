{% extends 'base.html' %}
{% block title %}Confirm Delete — Amar Honda Care{% endblock %}
{% block page_title %}Delete Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card text-center p-4">
            <div class="text-danger fs-1 mb-3"><i class="bi bi-trash"></i></div>
            <h5>Delete "{{ object.name }}"?</h5>
            <p class="text-muted small">This action cannot be undone.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <a href="{% url 'products:product_list' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
